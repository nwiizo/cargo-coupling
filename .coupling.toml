# cargo-coupling subdomain classification (Khononov: essential vs accidental volatility).
#
# Rationale: this is a stable CLI tool, not a product with a constantly-churning
# business core. The genuinely-evolving heart is the coupling *model* itself
# (the scoring/metric definitions); everything else is supporting infrastructure
# or solved/generic problems. Recent high git-churn is a one-time feature sprint
# (accidental volatility), so volatility here is assessed from business context,
# not raw commit frequency.

[subdomains]
# Core: the coupling model — competitive logic that evolves as our understanding
# of "balanced coupling" deepens. High essential volatility is expected here.
core = [
    "src/balance/**",
    "src/metrics/**",
]

# Supporting: analysis machinery and output around the model. Changes track the
# core but are not themselves the differentiator. Low essential volatility.
supporting = [
    "src/analyzer.rs",
    "src/discovery.rs",
    "src/report.rs",
    "src/cli_output.rs",
    "src/history.rs",
    "src/diff.rs",
    "src/external.rs",
    "src/manifest.rs",
    "src/volatility.rs",
]

# Generic: solved problems / plumbing. Stable by nature; low essential volatility.
generic = [
    "src/config.rs",
    "src/workspace.rs",
    "src/web/**",
]

[analysis]
# Tests are scaffolding, not product coupling. Kept even though a `coupling ./src`
# run never sees tests/ — it protects whole-repo analysis (drift notes ignore excludes).
exclude = ["**/tests/**"]
